<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Psalm 119</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <button id="resetAppButton" class="reset-app-button" type="button" aria-label="Reset saved progress">
      reset
    </button>

    <button id="prevDay" class="nav-button nav-button-left" type="button" aria-label="Previous day">
      &#8592;
    </button>

    <main class="page">
      <header class="top">
        <p class="book">Psalm 119</p>
        <p id="dayMeta" class="day-meta"></p>
        <h1 id="dayTitle" class="day-title"></h1>
        <p id="dayRange" class="day-range"></p>
      </header>

      <section id="verseBlocks" class="verse-blocks" aria-live="polite"></section>

      <section class="prayer-panel" aria-label="Prayer of Application">
        <button id="prayerFocusButton" class="prayer-focus-button" type="button">
          Prayer of Application
        </button>
        <p id="selectedVerseLabel" class="selected-verse-label" hidden>Selected verse</p>
        <p id="selectedVerseText" class="selected-verse-text" hidden></p>
        <div class="prayer-box">
          <textarea
            id="prayerInput"
            class="prayer-input"
            rows="6"
            placeholder="Write your prayer here."
            aria-label="Prayer of Application"
          ></textarea>
          <div class="prayer-actions">
            <p id="saveStatus" class="save-status" aria-live="polite"></p>
            <button id="savePrayerButton" class="save-prayer-button" type="button">Save</button>
          </div>
        </div>
      </section>
    </main>

    <button id="nextDay" class="nav-button nav-button-right" type="button" aria-label="Next day">
      &#8594;
    </button>

    <div class="translation-dock">
      <button
        id="translationToggle"
        class="translation-toggle"
        type="button"
        aria-label="Toggle Bible translation"
        aria-pressed="false"
      >
        <span class="translation-thumb"></span>
        <span class="translation-label translation-label-left">NIV</span>
        <span class="translation-label translation-label-right">ESV</span>
      </button>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
